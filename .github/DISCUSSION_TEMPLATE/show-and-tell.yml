# ───────────────────────────────────────────────────────────────────
#  BREEZIL - Show and tell discussion form (per repo; tailor per project)
#  Path:  .github/DISCUSSION_TEMPLATE/show-and-tell.yml  (file name = category slug)
# ───────────────────────────────────────────────────────────────────
title: "[Show and tell]: "
body:
  - type: markdown
    attributes:
      value: |
        Built something with `@breezil/packet-defs`? Show it off. We love seeing what people make. 🎉
  - type: textarea
    id: what
    attributes:
      label: What did you build?
      placeholder: A proxy, parser, bot, mod, or tool that uses the packet definitions.
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link
      placeholder: Repo, video, screenshot, or live demo.
  - type: input
    id: version
    attributes:
      label: Minecraft version / protocol
      placeholder: "e.g. 1.8.9 (protocol 47)"

