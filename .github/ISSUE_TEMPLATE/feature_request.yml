# ───────────────────────────────────────────────────────────────────
#  BREEZIL - Feature request issue form
#  Path in each repo:  .github/ISSUE_TEMPLATE/feature_request.yml
# ───────────────────────────────────────────────────────────────────
name: 💡 Feature request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We would love to hear it. Tell us the problem first, then your proposed fix.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and discussions and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point. Focus on the why, not the how.
      placeholder: "I am always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Mockups, links, examples, anything else.

