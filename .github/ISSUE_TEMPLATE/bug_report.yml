# ───────────────────────────────────────────────────────────────────
#  BREEZIL - Bug report issue form
#  Path in each repo:  .github/ISSUE_TEMPLATE/bug_report.yml
#  GitHub renders this as a guided form when someone opens an issue.
# ───────────────────────────────────────────────────────────────────
name: 🐛 Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more detail you give, the faster we can fix it. 💙

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true
        - label: I am using a supported version of the project.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run ..., I expected ... but instead ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make the bug happen?
      placeholder: |
        1. Run '...'
        2. With input '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: "e.g. v1.2.0 or commit sha"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant log output. It will be formatted automatically.
      render: shell

